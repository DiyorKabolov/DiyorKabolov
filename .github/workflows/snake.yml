name: generate animation

on:
  # запуск каждые 24 часа
  schedule:
    - cron: "0 */24 * * *" 
  
  # возможность запустить вручную
  workflow_dispatch:
  
  # запуск при каждом пуше в main ветку
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Генерирует змейку из графа коммитов пользователя
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DiyorKabolov
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#3c7dd9&growth=true
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#3c7dd9&growth=true
          
      # Пушит результат в ветку output
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
